<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Gamja+Flower&family=Nanum+Myeongjo&family=Song+Myung&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #222; /* 배경은 칙칙하게 해서 폰트가 튀게 함 */
            color: white;
            font-family: sans-serif;
        }

        h1 {
            text-align: center;
            font-family: 'Song Myung', serif;
            margin-bottom: 30px;
        }

        /* ★ 핵심: 꽉 차는 격자 레이아웃 ★ */
        #gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            /* 꽉 차게 하기 위해 벽돌 쌓기 방식 적용 */
            grid-auto-flow: dense;
        }

        .text-tile {
            padding: 25px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.6;
            word-break: break-all;
            white-space: pre-wrap;
            transition: transform 0.3s;
            box-sizing: border-box;
            /* 가끔 큰 타일 만들기 (랜덤하게 자바스크립트로 조절할 것) */
            grid-column: span 1;
            grid-row: span 1;
        }

        .text-tile:hover {
            transform: scale(1.03) rotate(1deg); /* 마우스 올리면 살짝 커지고 회전 */
            z-index: 10;
        }

        /* 돌아가기 버튼 */
        .back-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.8);
            color: #333;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 100;
        }
    </style>
</head>
<body>

    <h1>축적</h1>
    <div id="gallery-container">데이터를 불러오는 중입니다...</div>
    
    <a href="index.html" class="back-btn">⬅ 목록으로 돌아가기</a>

    <script>
        // 앱스 스크립트 API 주소 (동일하게 사용)
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzd77E3TuZzFoxsN9C5W0ZIYscV3NEsndO-mhel9JZPNap6sS4_O7wDpc9rz8gmcEu-/exec";
        const container = document.getElementById('gallery-container');

        // ★ 설정: 사용할 랜덤 폰트 리스트 (구글 폰트 명칭)
        const fontList = [
            "'Gaegu', cursive",
            "'Gamja Flower', cursive",
            "'Nanum Myeongjo', serif",
            "'Song Myung', serif",
            "serif",
            "monospace"
        ];

        // ★ 랜덤 색상 생성기 (너무 하얗거나 칙칙하지 않게 범위 조절)
        // 텍스트는 흰색으로 고정할 거라, 배경색은 중간 톤의 파스텔~원색 계열로 잡음
        function getRandomColor() {
            // HSL 색상 공간 사용 (색상, 채도, 명도)
            const h = Math.floor(Math.random() * 360); // 0~360도 색상 전체
            const s = Math.floor(Math.random() * 50) + 40; // 채도: 40~90% (칙칙하지 않게)
            const l = Math.floor(Math.random() * 30) + 40; // 명도: 40~70% (너무 하얗거나 어둡지 않게)
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        // 배열 순서 섞기 (피셔-예이츠 셔플)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadRandomGallery() {
            container.innerHTML = "감성을 불러오는 중...";
            
            fetch(scriptUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) {
                        container.innerHTML = "기록이 없습니다.";
                        return;
                    }

                    // 순서를 랜덤하게 섞음 (매번 방문할 때마다 배치가 달라짐)
                    shuffleArray(data);

                    let html = '';
                    data.forEach(item => {
                        const safeContent = item.content.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        
                        // 랜덤 속성 적용
                        const bgColor = getRandomColor();
                        const font = fontList[Math.floor(Math.random() * fontList.length)];
                        // 가끔 텍스트 크기 키움 (랜덤)
                        const fontSize = Math.random() > 0.8 ? '1.4rem' : '1rem';
                        // 가끔 타일 크기 키움 (격자 꽉 차게 하기 위해)
                        const spanStyle = Math.random() > 0.85 ? 'grid-column: span 2; grid-row: span 2;' : '';

                        html += `
                            <div class="text-tile" style="background-color: ${bgColor}; font-family: ${font}; font-size: ${fontSize}; ${spanStyle}">
                                ${safeContent}
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                })
                .catch(err => container.innerHTML = "오류.");
        }

        loadRandomGallery();
    </script>
</body>
</html>
