<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 입력 및 목록 웹사이트</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #f4f7f6;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .left-panel, .right-panel {
            flex: 1;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fafafa;
        }
        h2 {
            margin-top: 0;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 4px;
        }
        /* 리스트 스타일 (제목 클릭 시 본문 펼쳐짐) */
        #list-container {
            height: 600px;
            overflow-y: auto;
        }
        details {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
            padding: 10px 15px;
        }
        summary {
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            list-style: none; /* 기본 화살표 숨김 (브라우저 호환) */
            outline: none;
        }
        summary::-webkit-details-marker {
            display: none;
        }
        summary::before {
            content: "➕ "; /* 닫혀있을 때 아이콘 */
            font-size: 0.8em;
        }
        details[open] summary::before {
            content: "➖ "; /* 열려있을 때 아이콘 */
        }
        .content-body {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
            color: #444;
            line-height: 1.6;
            white-space: pre-wrap; /* 줄바꿈 유지 */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <h2>목록 (List)</h2>
            <div id="list-container">데이터를 불러오는 중입니다...</div>
        </div>

        <div class="right-panel">
            <h2>입력 (Input)</h2>
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfEbPitgCGNxb_SpbtENvFvMMyu3ykyScZfnfV52p3pq8g3hA/viewform?embedded=true"></iframe>
        </div>
    </div>

    <script>
        // 구글 시트 데이터를 JSON 형식으로 가져오는 주소
        // 사용자가 올린 시트 ID(2PACX...n8-)를 사용했습니다.
        const sheetId = "2PACX-1vRRT7oZ48CW8Yl7jWd9B0HF1FVX8HZCU2REomvPtaxwkDxoP5-3dlYHPDWyaM6y1j8ZSFnaqDsq-n8-";
        const url = `https://docs.google.com/spreadsheets/d/e/${sheetId}/gviz/tq?tqx=out:json`;

        fetch(url)
            .then(res => res.text())
            .then(text => {
                // 구글이 반환하는 불필요한 텍스트 제거하고 순수 JSON만 파싱
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);
                const rows = data.table.rows;
                
                let html = '';
                
                // 첫 번째 줄(제목 행)을 제외하고 데이터 반복 (i=1부터 시작)
                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].c;
                    
                    // 구글 폼 기본 구조: A열(0) 타임스탬프, B열(1) 제목, C열(2) 본문이라고 가정
                    // 시트 구조에 따라 인덱스(1, 2)는 변경될 수 있습니다.
                    const title = columns[1] && columns[1].v ? columns[1].v : '제목 없음';
                    const body = columns[2] && columns[2].v ? columns[2].v : '내용 없음';

                    // HTML <details> 태그를 사용하여 클릭 시 열리고 닫히는 UI 생성
                    html += `
                        <details>
                            <summary>${title}</summary>
                            <div class="content-body">${body}</div>
                        </details>
                    `;
                }

                document.getElementById('list-container').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('list-container').innerHTML = "데이터를 불러오는 데 실패했습니다.";
                console.error("Error fetching data:", error);
            });
    </script>

</body>
</html>
