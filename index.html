<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 입력 및 목록 (자체 DB)</title>
    <style>
        /* ★ 검정 배경, 흰색 텍스트, 날카로운 직각 스타일 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #0a0a0a; /* 딥 블랙 */
            color: #eeeeee;
        }
        
        /* 좌우 레이아웃 복귀 */
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .container {
                flex-direction: row;
            }
            .left-panel, .right-panel {
                flex: 1;
            }
        }

        /* 패널: 직각 모서리, 미세한 테두리 */
        .left-panel, .right-panel {
            background: #111111;
            padding: 25px;
            border: 1px solid #333;
            border-radius: 0; /* 둥근 모서리 완전 제거 */
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #ffffff;
            border-bottom: 2px solid #ff1493; /* 핫핑크 언더라인 */
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 목록 헤더 (제목 + EXPAND 버튼) */
        .list-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff1493;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        .list-header-container h2 {
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        /* 힙한 EXPAND 버튼 (검정 배경 + 핫핑크 테두리/글자 + 직각) */
        .go-random-btn {
            background-color: #000000; 
            color: #ff1493; 
            border: 1px solid #ff1493;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 0; 
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        .go-random-btn:hover {
            background-color: #ff1493;
            color: #000000; 
        }

        /* 목록 영역 스타일 */
        #list-container {
            max-height: 600px;
            overflow-y: auto;
            /* 스크롤바 디자인 (크롬/사파리) */
            scrollbar-width: thin;
            scrollbar-color: #ff1493 #111;
        }
        #list-container::-webkit-scrollbar { width: 6px; }
        #list-container::-webkit-scrollbar-thumb { background: #ff1493; }
        #list-container::-webkit-scrollbar-track { background: #111; }
        
        /* 목록 아이템: 다크 그레이 배경, 핫핑크 포인트 선 */
        details {
            background: #1a1a1a;
            border: 1px solid #333;
            border-left: 3px solid #ff1493; /* 왼쪽에 핫핑크 포인트 */
            border-radius: 0;
            margin-bottom: 15px;
            padding: 15px;
            transition: all 0.2s ease;
            position: relative;
        }
        details:hover {
            border-color: #ff1493;
        }
        
        summary {
            font-weight: 600;
            font-size: 1.05rem;
            color: #ffffff;
            cursor: pointer;
            list-style: none;
            outline: none;
            word-break: keep-all;
            padding-right: 65px; 
        }
        
        summary::-webkit-details-marker { display: none; }
        summary::before { content: "► "; font-size: 0.8em; margin-right: 8px; color: #ff1493; }
        details[open] summary::before { content: "▼ "; }
        
        .content-body {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #444;
            color: #cccccc; /* 본문은 약간 흐린 회색으로 가독성 확보 */
            line-height: 1.7;
            font-size: 0.95rem;
            white-space: pre-wrap;
            text-align: justify;
        }

        /* 삭제 버튼: 심플하고 날카롭게 */
        .delete-btn {
            position: absolute;
            top: 13px;
            right: 15px;
            background-color: transparent;
            color: #666;
            border: 1px solid #666;
            padding: 3px 8px;
            border-radius: 0;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .delete-btn:hover { 
            background-color: #ff1493; 
            border-color: #ff1493;
            color: #000;
        }

        /* 입력 폼 스타일 */
        .custom-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-weight: 600; font-size: 0.9rem; color: #ff1493; letter-spacing: 1px; text-transform: uppercase; }

        /* 입력창: 블랙 앤 핑크 */
        .custom-form input, .custom-form textarea {
            width: 100%; 
            padding: 15px; 
            background-color: #0a0a0a;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 0; 
            font-size: 1rem; 
            font-family: inherit;
            box-sizing: border-box; 
            transition: border-color 0.2s;
        }
        .custom-form input:focus, .custom-form textarea:focus { 
            outline: none; 
            border-color: #ff1493; /* 포커스 시 핫핑크 라인 */
        }
        .custom-form textarea { height: 250px; resize: vertical; }

        /* 제출 버튼: 강렬한 핫핑크 직각 블록 */
        .submit-btn {
            background-color: #ff1493; 
            color: #000000; 
            border: none;
            padding: 16px; 
            border-radius: 0; 
            font-size: 1.1rem;
            font-weight: 800; 
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer; 
            transition: background-color 0.2s;
        }
        .submit-btn:hover { background-color: #ff69b4; }
        .submit-btn:disabled { background-color: #555; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="list-header-container">
                <h2>List</h2>
                <a href="random.html" class="go-random-btn">EXPAND</a>
            </div>
            <div id="list-container">데이터를 불러오는 중입니다...</div>
        </div>

        <div class="right-panel">
            <h2>Input</h2>
            <form class="custom-form" id="myForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required placeholder="제목을 입력하세요">
                </div>
                
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" required placeholder="내용을 입력하세요"></textarea>
                </div>
                
                <button type="submit" id="submitBtn" class="submit-btn">Submit</button>
            </form>
        </div>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzd77E3TuZzFoxsN9C5W0ZIYscV3NEsndO-mhel9JZPNap6sS4_O7wDpc9rz8gmcEu-/exec";
        const listContainer = document.getElementById('list-container');
        const myForm = document.getElementById('myForm');
        const submitBtn = document.getElementById('submitBtn');

        function loadData() {
            listContainer.innerHTML = "<span style='color:#666;'>SYSTEM: Loading data...</span>";
            
            fetch(scriptUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) {
                        listContainer.innerHTML = "<span style='color:#666;'>SYSTEM: No records found.</span>";
                        return;
                    }

                    let html = '';
                    for (let i = data.length - 1; i >= 0; i--) {
                        const item = data[i];
                        const safeTitle = String(item.title || "Untitled").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        const safeContent = String(item.content || "No content").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        
                        html += `
                            <details>
                                <summary>${safeTitle}</summary>
                                <button class="delete-btn" onclick="deleteData('${item.id}')">DEL</button>
                                <div class="content-body">${safeContent}</div>
                            </details>
                        `;
                    }
                    listContainer.innerHTML = html;
                })
                .catch(error => {
                    listContainer.innerHTML = "<span style='color:#ff1493;'>ERROR: Failed to fetch data.</span>";
                    console.error("Error:", error);
                });
        }

        myForm.addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const titleVal = document.getElementById('title').value;
            const contentVal = document.getElementById('content').value;
            
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const formData = new URLSearchParams();
            formData.append('action', 'insert');
            formData.append('title', titleVal);
            formData.append('content', contentVal);

            fetch(scriptUrl, {
                method: 'POST',
                body: formData
            })
            .then(() => {
                myForm.reset(); 
                loadData(); 
            })
            .catch(error => {
                alert("등록 중 오류가 발생했습니다.");
                console.error("Error:", error);
            })
            .finally(() => {
                submitBtn.innerText = "Submit";
                submitBtn.disabled = false;
            });
        });

        function deleteData(id) {
            if (!confirm("정말 이 데이터를 삭제하시겠습니까?")) return;

            event.target.innerText = "...";
            event.target.disabled = true;

            const formData = new URLSearchParams();
            formData.append('action', 'delete');
            formData.append('id', id);

            fetch(scriptUrl, {
                method: 'POST',
                body: formData
            })
            .then(() => {
                loadData(); 
            })
            .catch(error => {
                alert("삭제 중 오류가 발생했습니다.");
                console.error("Error:", error);
                loadData(); 
            });
        }

        loadData();
    </script>
</body>
</html>
