<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 입력 및 목록</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f7f6;
            color: #333;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .container {
                flex-direction: row;
            }
            .left-panel, .right-panel {
                flex: 1;
            }
        }

        .left-panel, .right-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        /* 왼쪽 리스트 영역 스타일 */
        #list-container {
            max-height: 600px;
            overflow-y: auto;
        }
        
        details {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 10px;
            padding: 12px 15px;
            transition: all 0.2s ease;
        }
        
        summary {
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            list-style: none;
            outline: none;
            word-break: keep-all;
        }
        
        summary::-webkit-details-marker {
            display: none;
        }
        
        summary::before {
            content: "➕ ";
            font-size: 0.8em;
            margin-right: 5px;
        }
        
        details[open] summary::before {
            content: "➖ ";
        }
        
        .content-body {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #cbd5e1;
            color: #475569;
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        /* 오른쪽 자체 입력 폼 스타일 */
        .custom-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
        }

        .custom-form input, .custom-form textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .custom-form input:focus, .custom-form textarea:focus {
            outline: none;
            border-color: #2c3e50;
        }

        .custom-form textarea {
            height: 200px;
            resize: vertical;
        }

        .submit-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <h2>목록 (List)</h2>
            <div id="list-container">데이터를 불러오는 중입니다...</div>
        </div>

        <div class="right-panel">
            <h2>입력 (Input)</h2>
            
            <form action="https://docs.google.com/forms/d/e/1FAIpQLSfEbPitgCGNxb_SpbtENvFvMMyu3ykyScZfnfV52p3pq8g3hA/formResponse" 
                  method="POST" 
                  target="hidden_iframe" 
                  class="custom-form" 
                  id="myForm"
                  onsubmit="submitted=true;">
                
                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="entry.900408598" required placeholder="제목을 입력하세요">
                </div>
                
                <div class="form-group">
                    <label for="content">본문</label>
                    <textarea id="content" name="entry.1520761373" required placeholder="내용을 입력하세요"></textarea>
                </div>
                
                <button type="submit" class="submit-btn">제출하기</button>
            </form>

            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){ formCompleted(); }"></iframe>
        </div>
    </div>

    <script>
        // 전역 변수: 폼 제출 상태 확인용
        let submitted = false;

        // 제출 완료 시 실행될 함수
        function formCompleted() {
            alert("성공적으로 기록되었습니다. 데이터가 반영되는 데 몇 분 정도 소요될 수 있습니다.");
            document.getElementById("myForm").reset(); // 폼 내용 초기화
            submitted = false;
        }

        // 구글 시트 데이터 로드
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRRT7oZ48CW8Yl7jWd9B0HF1FVX8HZCU2REomvPtaxwkDxoP5-3dlYHPDWyaM6y1j8ZSFnaqDsq-n8-/pub?gid=1945945241&single=true&output=csv";

        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        fetch(csvUrl)
            .then(response => response.text())
            .then(csvText => {
                const data = parseCSV(csvText);
                let html = '';
                
                if (data.length <= 1) {
                    document.getElementById('list-container').innerHTML = "아직 입력된 데이터가 없습니다.";
                    return;
                }

                for (let i = data.length - 1; i >= 1; i--) {
                    const row = data[i];
                    
                    if (!row || row.length === 0 || (!row[0] && !row[1])) continue;

                    const title = row[1] ? row[1].replace(/</g, "&lt;").replace(/>/g, "&gt;") : '제목 없음';
                    const body = row[2] ? row[2].replace(/</g, "&lt;").replace(/>/g, "&gt;") : '내용이 없습니다.';

                    html += `
                        <details>
                            <summary>${title}</summary>
                            <div class="content-body">${body}</div>
                        </details>
                    `;
                }

                document.getElementById('list-container').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('list-container').innerHTML = "데이터를 불러오는 데 실패했습니다.";
                console.error("Error fetching data:", error);
            });
    </script>

</body>
</html>
