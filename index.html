<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 입력 및 목록</title>
    <style>
        /* 모바일 및 PC 반응형 기본 스타일 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f7f6;
            color: #333;
        }
        
        .container {
            display: flex;
            flex-direction: column; /* 모바일: 세로 배치 */
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 화면이 넓어지면(PC) 가로 배치로 변경 */
        @media (min-width: 768px) {
            .container {
                flex-direction: row;
            }
            .left-panel, .right-panel {
                flex: 1;
            }
        }

        .left-panel, .right-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        /* 왼쪽 리스트 영역 스타일 (제목 누르면 본문 나옴) */
        #list-container {
            max-height: 600px;
            overflow-y: auto;
        }
        
        details {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 10px;
            padding: 12px 15px;
            transition: all 0.2s ease;
        }
        
        summary {
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            list-style: none;
            outline: none;
            word-break: keep-all;
        }
        
        summary::-webkit-details-marker {
            display: none;
        }
        
        summary::before {
            content: "➕ ";
            font-size: 0.8em;
            margin-right: 5px;
        }
        
        details[open] summary::before {
            content: "➖ ";
        }
        
        .content-body {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #cbd5e1;
            color: #475569;
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        /* 오른쪽 구글 폼 영역 스타일 */
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <h2>목록 (List)</h2>
            <div id="list-container">데이터를 불러오는 중입니다...</div>
        </div>

        <div class="right-panel">
            <h2>입력 (Input)</h2>
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfEbPitgCGNxb_SpbtENvFvMMyu3ykyScZfnfV52p3pq8g3hA/viewform?embedded=true">로드 중…</iframe>
        </div>
    </div>

    <script>
        // 게시하신 구글 시트의 CSV 데이터 주소
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRRT7oZ48CW8Yl7jWd9B0HF1FVX8HZCU2REomvPtaxwkDxoP5-3dlYHPDWyaM6y1j8ZSFnaqDsq-n8-/pub?gid=1945945241&single=true&output=csv";

        // CSV 데이터를 읽어오는 함수
        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        // 데이터를 화면에 그려주는 기능
        fetch(csvUrl)
            .then(response => response.text())
            .then(csvText => {
                const data = parseCSV(csvText);
                let html = '';
                
                // 입력된 데이터가 없을 때
                if (data.length <= 1) {
                    document.getElementById('list-container').innerHTML = "아직 입력된 데이터가 없습니다.";
                    return;
                }

                // 최신 글이 위로 오도록 역순으로 목록 만들기 (i를 data.length - 1부터 줄여나감)
                for (let i = data.length - 1; i >= 1; i--) {
                    const row = data[i];
                    
                    // 빈 줄은 건너뜀
                    if (!row || row.length === 0 || (!row[0] && !row[1])) continue;

                    // 구글 폼 열매칭: [1]번째가 제목, [2]번째가 본문
                    const title = row[1] ? row[1].replace(/</g, "&lt;").replace(/>/g, "&gt;") : '제목 없음';
                    const body = row[2] ? row[2].replace(/</g, "&lt;").replace(/>/g, "&gt;") : '내용이 없습니다.';

                    // HTML <details> 태그로 아코디언 메뉴 생성
                    html += `
                        <details>
                            <summary>${title}</summary>
                            <div class="content-body">${body}</div>
                        </details>
                    `;
                }

                // 왼쪽 리스트 영역에 만든 HTML을 넣음
                document.getElementById('list-container').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('list-container').innerHTML = "데이터를 불러오는 데 실패했습니다. 구글 시트 웹 게시 설정을 확인해주세요.";
                console.error("Error fetching data:", error);
            });
    </script>

</body>
</html>
