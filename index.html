<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 입력 및 목록 웹사이트</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #f4f7f6;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .left-panel, .right-panel {
            flex: 1;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        .left-panel {
            background-color: #fafafa;
        }
        h2 {
            margin-top: 0;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        /* iframe(구글 폼/시트)이 영역에 꽉 차도록 설정 */
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <h2>목록 (Title)</h2>
            <iframe src=<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfEbPitgCGNxb_SpbtENvFvMMyu3ykyScZfnfV52p3pq8g3hA/viewform?embedded=true" width="640" height="556" frameborder="0" marginheight="0" marginwidth="0">로드 중…</iframe>></iframe>
        </div>

        <div class="right-panel">
            <h2>입력 (Input)</h2>
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRRT7oZ48CW8Yl7jWd9B0HF1FVX8HZCU2REomvPtaxwkDxoP5-3dlYHPDWyaM6y1j8ZSFnaqDsq-n8-/pubhtml?gid=1945945241&amp;single=true&amp;widget=true&amp;headers=false"></iframe>
        </div>
    </div>

</body>
</html>
